                  p_catalog: ods_3nf_cert
                  p_schema: ods
                source: GIT
          git_source:
            git_url: ${bundle.git.origin_url} # https://CNH-Data-Platform@dev.azure.com/CNH-Data-Platform/Data%20Platform/_git/EDS%20ADB%20Bundles
            git_provider: azureDevOpsServices            
            git_branch: certification           
  prod:
    resources:
      jobs:
        job-template:
          tasks:
            - task_key: main_task
              notebook_task:
                notebook_path: bundle_template/notebooks/main_task_template
                base_parameters:
                  p_catalog: ods_3nf_prod
                  p_schema: ods
                source: GIT
          git_source:
            git_url: ${bundle.git.origin_url} # https://CNH-Data-Platform@dev.azure.com/CNH-Data-Platform/Data%20Platform/_git/EDS%20ADB%20Bundles
            git_provider: azureDevOpsServices            
            git_branch: production
