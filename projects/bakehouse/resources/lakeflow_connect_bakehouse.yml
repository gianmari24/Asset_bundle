resources:
  pipelines:
    pipeline_lakeflow_connect_bakehouse:
      name: ${var.v_catalog}_lakeflow_connect_bakehouse
      configuration:
        catalog: ${var.v_catalog}
      tags:
        Project: ${var.v_catalog}_Demo
      ingestion_definition:
        connection_name: demo_databricks_postgresql
        objects:
          - table:
              source_catalog: demo_databricks
              source_schema: public
              source_table: sales_customers
              destination_catalog: ${var.v_catalog}
              destination_schema: bronze
              destination_table: sales_customers_bronze
              table_configuration:
                scd_type: SCD_TYPE_2
                primary_keys:
                  - customerid
                query_based_connector_config:
                  cursor_columns:
                    - updated_at
          - table:
              source_catalog: demo_databricks
              source_schema: public
              source_table: sales_transactions
              destination_catalog: ${var.v_catalog}
              destination_schema: bronze
              destination_table: sales_transactions_bronze
              table_configuration:
                primary_keys:
                  - transactionid
                query_based_connector_config:
                  cursor_columns:
                    - updated_at
        source_type: POSTGRESQL
      schema: bronze
      channel: PREVIEW
      catalog: ${var.v_catalog}
