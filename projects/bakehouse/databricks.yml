# =============================================================================
# This is a Databricks Asset Bundle definition.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
# See https://learn.microsoft.com/it-it/azure/databricks/dev-tools/bundles/variables
#
# This file is the entry point of the bundle and defines:
# - the bundle name
# - which files are included
# - the resources to deploy (dashboards, jobs, etc.)
# - deployment targets (dev / qas / prod)
# =============================================================================

bundle:
  # Logical name of the bundle.
  # Used by Databricks for:
  # - resource naming
  # - deployment paths
  # - automatic prefixes in development mode
  name: bundle_bakehouse

include:
  - resources/*.yml # Include all resource definitions (jobs, dashboards, pipelines, ...)
  - variables/*.yml # Include variable definitions (usually environment-specific)


#=============================================================================
# DEPLOYMENT TARGETS (ENVIRONMENTS)
# Each target represents one environment (dev / qas / prod)
# =============================================================================

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    variables:
      # Deployment mode for this environment
      v_mode: development
      # Default workspace paths for bundles (commented out here)
      # Usually defined globally in variables/*.yml
      # v_root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.target}/${bundle.name}
      # v_file_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.target}/${bundle.name}/files
    # Use the deployment mode defined in variables
    mode: ${var.v_mode}
    # This target is used when no --target is specified
    default: true
    # Workspace configuration for the dev environment
    workspace:
      # Databricks workspace URL
      host: https://dbc-afeefbf3-0c30.cloud.databricks.com/?o=7474657116973183
      # Root path where bundle resources (dashboards, jobs, etc.) are deployed
      root_path: ${var.v_root_path}
      # Path where files (notebooks, scripts, assets) are uploaded
      file_path: ${var.v_file_path}
    # Permissions applied to deployed resources
    permissions:
    - user_name: ${workspace.current_user.userName}
      level: CAN_MANAGE
    # - group_name:
    #   level: group_dab

  qas:
    # Quality/Testing environment
    variables:
      # Production mode: no dev prefixes, schedules enabled
      v_mode: production
      # Unity Catalog catalog used in QAS
      v_catalog: qas
    mode: ${var.v_mode}
    workspace:
      host: https://dbc-afeefbf3-0c30.cloud.databricks.com/?o=7474657116973183
      root_path: ${var.v_root_path}
      file_path: ${var.v_file_path}
    permissions:
      # Permissions for the current user
      - user_name: ${workspace.current_user.userName}
        level: CAN_MANAGE
      # Permissions for a Databricks group
      - group_name: group_dab
        level: CAN_MANAGE
    # Identity used to deploy and run resources
    # Best practice for non-dev environments
    run_as:
      service_principal_name: bbf4c6dd-186d-44d4-b994-10ef9b0410ce

  prod:
    # Production environment
    variables:
      v_mode: production
      v_catalog: prod
    mode: ${var.v_mode}
    workspace:
      host: https://dbc-afeefbf3-0c30.cloud.databricks.com/?o=7474657116973183
      root_path: ${var.v_root_path}
      file_path: ${var.v_file_path}
    permissions:
      - user_name: ${workspace.current_user.userName}
        level: CAN_MANAGE
      - group_name: group_dab
        level: CAN_MANAGE
    run_as:
      service_principal_name: bbf4c6dd-186d-44d4-b994-10ef9b0410ce

